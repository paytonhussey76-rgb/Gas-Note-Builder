<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gas Locate Note Builder</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1c1f22">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gas Notes">
<style>
  :root{
    --asphalt:#1c1f22;
    --asphalt-2:#25292d;
    --card:#2c3136;
    --line:#3a4048;
    --paper:#f2ede2;
    --ink:#e9e5db;
    --dim:#9aa3ab;
    --gasflag:#ffcc33;
    --poly:#3fc7c7;
    --steel:#b7bec6;
    --hp:#ff6a3d;
    --abandoned:#a68a5b;
    --danger:#ff6b6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--asphalt); color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif; padding-bottom:220px;
  }
  header{
    padding:20px 18px 14px; border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:5; background:var(--asphalt);
  }
  .headerrow{ display:flex; align-items:center; gap:12px; }
  .menubtn{
    background:var(--card); border:1px solid var(--line); color:var(--ink);
    width:38px; height:38px; border-radius:10px; font-size:18px; flex:0 0 auto; line-height:1;
  }
  .headertext h1{ font-size:18px; margin:0 0 2px; font-weight:700; }
  .headertext .sub{ font-size:11px; color:var(--dim); font-family:'Courier New',monospace; letter-spacing:0.5px; }

  .menupanel{
    display:none; flex-direction:column; position:fixed; top:76px; left:16px;
    background:var(--card); border:1px solid var(--line); border-radius:12px; overflow:hidden;
    z-index:20; min-width:190px; box-shadow:0 10px 30px rgba(0,0,0,0.45);
  }
  .menuitem{
    background:none; border:none; color:var(--ink); text-align:left; padding:13px 16px;
    font-size:14px; border-bottom:1px solid var(--line);
  }
  .menuitem:last-child{ border-bottom:none; }
  .menuitem.active{ color:var(--gasflag); font-weight:700; }

  main{ padding:16px; }

  .category{
    background:var(--asphalt-2); border:1px solid var(--line); border-radius:14px;
    margin-bottom:16px; overflow:hidden; border-top-width:3px;
  }
  .category.poly{ border-top-color:var(--poly); }
  .category.poly-casing{ border-top-color:var(--poly); border-top-style:dashed; }
  .category.steel{ border-top-color:var(--steel); }
  .category.hp{ border-top-color:var(--hp); }
  .category.abandoned{ border-top-color:var(--abandoned); border-top-style:dashed; }
  .cat-head{
    padding:12px 14px 4px; font-size:13px; font-weight:700; letter-spacing:0.5px;
  }
  .cat-head .tag{ font-size:10px; font-weight:400; color:var(--dim); margin-left:6px; }
  .block{ padding:10px 14px 4px; }
  .block-label{ font-size:11px; text-transform:uppercase; letter-spacing:1px; color:var(--dim); margin-bottom:8px; font-weight:600; }

  .ltrow{ display:flex; gap:8px; margin-bottom:12px; }
  .ltchip{
    flex:1; text-align:center; border:1px solid var(--line); background:var(--card); color:var(--dim);
    padding:8px 10px; border-radius:10px; font-size:12.5px;
  }
  .ltchip.active{ color:var(--ink); border-color:var(--ink); }

  .chipwrap{ display:flex; flex-wrap:wrap; gap:7px; margin-bottom:12px; }
  .sizechip{
    position:relative; border:1px solid var(--line); background:var(--card); color:var(--ink);
    padding:9px 14px; border-radius:10px; font-size:14px; font-weight:600;
  }
  .sizechip.on.poly{ background:rgba(63,199,199,0.22); border-color:var(--poly); }
  .sizechip.on.steel{ background:rgba(183,190,198,0.22); border-color:var(--steel); }
  .sizechip.on.hp{ background:rgba(255,106,61,0.22); border-color:var(--hp); }
  .sizechip.on.abandoned{ background:rgba(166,138,91,0.25); border-color:var(--abandoned); }
  .badge-s{
    position:absolute; top:-6px; right:-6px; background:var(--gasflag); color:#1c1f22;
    font-size:10px; font-weight:800; border-radius:8px; padding:1px 5px; line-height:1.3;
  }

  .customrow{ display:flex; gap:8px; padding:0 14px 14px; }
  .customrow input{ flex:1; background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--ink); padding:9px 10px; font-size:13px; }
  .customrow button{ background:var(--card); border:1px solid var(--line); color:var(--dim); border-radius:10px; padding:0 14px; font-size:16px; }

  .notewrap{ display:flex; flex-wrap:wrap; gap:7px; }
  .notechip{ border:1px solid var(--line); background:var(--card); color:var(--ink); padding:8px 12px; border-radius:20px; font-size:13px; position:relative; }
  .notechip.on{ background:#3b3220; border-color:var(--gasflag); color:var(--gasflag); }
  .notechip.multi{ border-color:var(--gasflag); }

  .qc-card{
    background:var(--asphalt-2); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-bottom:10px; position:relative; text-align:left; width:100%;
  }
  .qc-card.copied{ border-color:#5fd66b; }
  .qc-text{ font-size:13.5px; line-height:1.4; font-family:'Courier New',monospace; padding-right:24px; color:var(--ink); }
  .qc-hint{ font-size:10px; color:var(--dim); margin-top:8px; text-transform:uppercase; letter-spacing:0.5px; }
  .qc-hint.copied{ color:#5fd66b; }
  .qc-del{ position:absolute; top:8px; right:8px; background:none; border:none; color:var(--danger); font-size:11px; padding:4px 6px; }
  .qc-add{ margin-top:6px; }
  .qc-add textarea{
    width:100%; min-height:70px; background:var(--card); border:1px solid var(--line); border-radius:10px;
    color:var(--ink); padding:10px; font-size:13px; font-family:'Courier New',monospace;
  }
  .qc-add button{
    margin-top:8px; width:100%; background:var(--gasflag); color:#1c1f22; border:none;
    padding:12px; border-radius:10px; font-weight:700; font-size:13px;
  }

  .findbtn{
    width:100%; background:var(--gasflag); color:#1c1f22; border:none;
    padding:14px; border-radius:10px; font-weight:700; font-size:14px; margin-bottom:10px;
  }
  .ph-status{ font-size:12px; color:var(--dim); margin-bottom:10px; min-height:16px; }
  .street-row{ border:1px solid var(--line); border-radius:10px; margin-bottom:8px; overflow:hidden; }
  .street-header{
    width:100%; display:flex; justify-content:space-between; align-items:center;
    background:var(--card); color:var(--ink); border:none; padding:12px 14px; font-size:13.5px; font-weight:600;
  }
  .street-header.active{ background:rgba(255,204,51,0.16); color:var(--gasflag); }
  .street-header .chev{ color:var(--dim); font-size:11px; }
  .street-header.active .chev{ color:var(--gasflag); }
  .street-houses{ padding:12px 14px 6px; background:var(--asphalt-2); border-top:1px solid var(--line); }
  .sizechip.on.house{ background:rgba(255,204,51,0.22); border-color:var(--gasflag); }
  .sizechip .dist{ display:block; font-size:9px; font-weight:400; color:var(--dim); margin-top:2px; }
  .ph-preview{
    font-size:14px; line-height:1.4; font-family:'Courier New',monospace;
    background:var(--card); border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-bottom:12px;
  }

  footer{
    position:fixed; bottom:0; left:0; right:0; background:var(--paper); color:#1c1f22;
    padding:14px 16px 18px; border-top:3px solid var(--gasflag);
  }
  footer .label{ font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:#6b6456; margin-bottom:5px; font-weight:700; }
  #preview{ font-size:14.5px; line-height:1.4; min-height:20px; margin-bottom:10px; font-family:'Courier New',monospace; }
  .footer-row{ display:flex; gap:10px; }
  .copybtn{ flex:1; background:#1c1f22; color:var(--gasflag); border:none; padding:13px; border-radius:10px; font-size:14px; font-weight:700; }
  .copybtn.done{ color:#5fd66b; }
  .clearbtn{ background:none; border:1px solid #6b6456; color:#6b6456; padding:13px 16px; border-radius:10px; font-size:13px; }
</style>
</head>
<body>

<header>
  <div class="headerrow">
    <button class="menubtn" id="menuBtn">☰</button>
    <div class="headertext">
      <h1 id="pageTitle">Note Builder</h1>
      <div class="sub" id="pageSub">TAP SIZES → MULTI-SELECT → COPY</div>
    </div>
  </div>
</header>

<div class="menupanel" id="menuPanel">
  <button class="menuitem" data-tab="builder">Note Builder</button>
  <button class="menuitem" data-tab="quickcopy">Quick Copy</button>
  <button class="menuitem" data-tab="projecthouses">Project Houses</button>
</div>

<main id="builderView">
  <div class="category poly">
    <div class="cat-head">POLY</div>
    <div class="block">
      <div id="polyLt" class="ltrow"></div>
      <div id="polySizes"></div>
    </div>
  </div>

  <div class="category poly-casing">
    <div class="cat-head">POLY <span class="tag">in casing</span></div>
    <div class="block">
      <div id="polyCasingLt" class="ltrow"></div>
      <div id="polyCasingSizes"></div>
    </div>
  </div>

  <div class="category steel">
    <div class="cat-head">STEEL</div>
    <div class="block">
      <div id="steelLt" class="ltrow"></div>
      <div id="steelSizes"></div>
    </div>
  </div>

  <div class="category hp">
    <div class="cat-head">HIGH PRESSURE <span class="tag">steel mainline</span></div>
    <div class="block">
      <div id="hpSizes"></div>
    </div>
  </div>

  <div class="category abandoned">
    <div class="cat-head">ABANDONED <span class="tag">by measurement</span></div>
    <div class="block">
      <div id="abandonedMatRow" class="ltrow"></div>
      <div id="abandonedSizes"></div>
    </div>
  </div>

  <div class="customrow">
    <input id="customSizeInput" placeholder='Add a size not listed (e.g. 1 1/2")'>
    <button id="addSizeBtn">+</button>
  </div>

  <div class="category" style="border-top-color:var(--line);">
    <div class="cat-head">NOTES</div>
    <div class="block">
      <div class="notewrap" id="notewrap"></div>
    </div>
  </div>
</main>

<main id="quickCopyView" style="display:none;">
  <div id="qcList"></div>
  <div class="category" style="border-top-color:var(--line);">
    <div class="cat-head">ADD A PRESET</div>
    <div class="block qc-add">
      <textarea id="qcNewText" placeholder='Type the full note, e.g. Marked 1&quot; poly service line from meter on property.'></textarea>
      <button id="qcAddBtn">+ Add preset</button>
    </div>
  </div>
</main>

<main id="projectHousesView" style="display:none;">
  <div class="category" style="border-top-color:var(--gasflag);">
    <div class="cat-head">FIND NEARBY HOUSES</div>
    <div class="block">
      <button id="findHousesBtn" class="findbtn">📍 Find nearby houses</button>
      <div id="phStatus" class="ph-status"></div>
      <div id="phStreetLabel" class="block-label" style="display:none;">Street (tap to expand)</div>
      <div id="phAccordion"></div>
    </div>
  </div>

  <div class="category" style="border-top-color:var(--line);">
    <div class="cat-head">ADD MANUALLY</div>
    <div class="block">
      <div class="customrow" style="padding:0 0 4px;">
        <input id="phManualInput" placeholder='Not in the list? e.g. 129 Main St'>
        <button id="phManualAddBtn">+</button>
      </div>
    </div>
  </div>

  <div class="category" style="border-top-color:var(--gasflag);">
    <div class="cat-head">SELECTED HOUSES <span class="tag" id="phCount"></span></div>
    <div class="block">
      <div id="phSelectedList" class="chipwrap"></div>
      <div class="block-label">Hookup note</div>
      <div id="phPreview" class="ph-preview">No houses selected yet.</div>
      <div class="footer-row" style="padding-bottom:10px;">
        <button class="copybtn" id="phCopyBtn">Copy hookup list</button>
        <button class="clearbtn" id="phClearBtn">Clear list</button>
      </div>
    </div>
  </div>
</main>

<footer id="footerBar">
  <div class="label">Generated note</div>
  <div id="preview">Marked…</div>
  <div class="footer-row">
    <button class="copybtn" id="copyBtn">Copy note</button>
    <button class="clearbtn" id="clearBtn">Clear</button>
  </div>
</footer>

<script>
const VERB = "Marked";
const SIZES = ["1/2\"","3/4\"","1\"","1 1/4\"","2\"","4\"","6\"","8\"","10\"","12\""];
const MODIFIERS = [
  {key:'meter', label:'Near meter', noun:'meter', group:'nearby'},
  {key:'meterprop', label:'Meter on property', noun:'meter', group:'onproperty'},
  {key:'riser', label:'Near riser', noun:'riser', group:'nearby'},
  {key:'testlead', label:'Near testlead', noun:'testlead', group:'nearby'},
  {key:'tracerwire', label:'Near tracerwire', noun:'tracerwire', group:'nearby'},
  {key:'regulator', label:'Near regulator', noun:'regulator', group:'nearby'}
];
const HP_WARNING = 'Whenever you dig within 5 feet of a high pressure line, you must schedule a "stand by" locator.';
const DEFAULT_PRESETS = [
  'Marked 1/2" poly service line and 2" poly mainline from meter on property.',
  'Marked 3/4" steel service line and 1" steel mainline from meter on property.',
  'No Conflict. Marked No NWN.',
  'Marked 1/2" poly service line from meter on property.',
  'Marked 3/4" steel service line from meter on property.'
];

let currentTab = 'builder';
let currentLt = { poly:'service', polyCasing:'service', steel:'service' };
let currentAbandonedMat = 'poly';
let selections = {
  poly:{service:{}, mainline:{}},
  steel:{service:{}, mainline:{}},
  hp:{mainline:{}},
  abandoned:{poly:{}, steel:{}}
};
let noteState = {};
let customSizes = [];
let quickPresets = [];
let nearbyResults = [];
let currentStreetFilter = null;
let selectedHouses = [];
const SIZES_KEY = 'gas-note-builder-v2:custom-sizes';
const PRESETS_KEY = 'gas-note-builder-v2:quick-presets';
const HOUSES_KEY = 'gas-note-builder-v2:project-houses';
const OVERPASS_RADIUS_M = 150;

async function loadSelectedHouses(){
  try{
    const raw = localStorage.getItem(HOUSES_KEY);
    if(raw) selectedHouses = JSON.parse(raw);
  }catch(e){ /* none yet */ }
}
async function saveSelectedHouses(){
  try{ localStorage.setItem(HOUSES_KEY, JSON.stringify(selectedHouses)); }
  catch(e){ console.error('save failed', e); }
}

async function loadCustomSizes(){
  try{
    const raw = localStorage.getItem(SIZES_KEY);
    if(raw) customSizes = JSON.parse(raw);
  }catch(e){ /* none yet */ }
}
async function saveCustomSizes(){
  try{ localStorage.setItem(SIZES_KEY, JSON.stringify(customSizes)); }
  catch(e){ console.error('save failed', e); }
}
async function loadPresets(){
  try{
    const raw = localStorage.getItem(PRESETS_KEY);
    if(raw){ quickPresets = JSON.parse(raw); return; }
  }catch(e){ /* none yet */ }
  quickPresets = [...DEFAULT_PRESETS];
  await savePresets();
}
async function savePresets(){
  try{ localStorage.setItem(PRESETS_KEY, JSON.stringify(quickPresets)); }
  catch(e){ console.error('save failed', e); }
}

function allSizes(){ return [...SIZES, ...customSizes]; }

function distanceMeters(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function houseKey(h){ return (h.housenumber||'') + '|' + (h.street||''); }
function isHouseSelected(h){
  const k = houseKey(h);
  return selectedHouses.some(s => houseKey(s)===k);
}
function toggleHouseSelection(h){
  const k = houseKey(h);
  const idx = selectedHouses.findIndex(s => houseKey(s)===k);
  if(idx>-1) selectedHouses.splice(idx,1);
  else selectedHouses.push({housenumber:h.housenumber, street:h.street});
  saveSelectedHouses();
}
function groupByStreet(results){
  const groups = {};
  const order = [];
  results.forEach(h=>{
    const key = h.street || '';
    if(!groups[key]){ groups[key] = []; order.push(key); }
    groups[key].push(h);
  });
  order.sort((a,b)=>{
    const da = Math.min(...groups[a].map(h=>h.dist));
    const db = Math.min(...groups[b].map(h=>h.dist));
    return da - db;
  });
  return { groups, order };
}

function findNearbyHouses(){
  const statusEl = document.getElementById('phStatus');
  const btn = document.getElementById('findHousesBtn');
  nearbyResults = [];
  currentStreetFilter = null;
  renderStreetAccordion();
  if(!('geolocation' in navigator)){
    statusEl.textContent = 'Location isn\'t available in this browser.';
    return;
  }
  btn.disabled = true;
  statusEl.textContent = 'Getting your location…';
  navigator.geolocation.getCurrentPosition(async (pos)=>{
    const { latitude, longitude } = pos.coords;
    statusEl.textContent = 'Searching nearby addresses…';
    try{
      const query = `[out:json][timeout:25];(node["addr:housenumber"](around:${OVERPASS_RADIUS_M},${latitude},${longitude});way["addr:housenumber"](around:${OVERPASS_RADIUS_M},${latitude},${longitude}););out center tags;`;
      const res = await fetch('https://overpass-api.de/api/interpreter', {
        method:'POST',
        body:'data=' + encodeURIComponent(query)
      });
      if(!res.ok) throw new Error('bad response');
      const data = await res.json();
      const seen = new Set();
      const results = [];
      (data.elements||[]).forEach(el=>{
        const hn = el.tags && el.tags['addr:housenumber'];
        if(!hn) return;
        const street = el.tags['addr:street'] || '';
        const key = hn + '|' + street;
        if(seen.has(key)) return;
        seen.add(key);
        const lat = el.lat != null ? el.lat : (el.center ? el.center.lat : null);
        const lon = el.lon != null ? el.lon : (el.center ? el.center.lon : null);
        const dist = (lat!=null && lon!=null) ? distanceMeters(latitude, longitude, lat, lon) : Infinity;
        results.push({ housenumber:hn, street, dist });
      });
      results.sort((a,b)=>a.dist-b.dist);
      nearbyResults = results;
      if(results.length){
        currentStreetFilter = groupByStreet(results).order[0];
      }
      renderStreetAccordion();
      statusEl.textContent = results.length
        ? `Found ${results.length} nearby — closest first.`
        : 'No addresses found nearby. This area may not be well-mapped — add manually below.';
    }catch(e){
      statusEl.textContent = 'Could not reach the address lookup. Check your connection and try again.';
    }
    btn.disabled = false;
  }, (err)=>{
    statusEl.textContent = 'Location permission denied or unavailable — enable location access and try again.';
    btn.disabled = false;
  }, { enableHighAccuracy:true, timeout:15000 });
}

async function copyTextRobust(text){
  try{
    if(navigator.clipboard && navigator.clipboard.writeText){
      await navigator.clipboard.writeText(text);
      return true;
    }
  }catch(e){ /* fall through */ }
  try{
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    return ok;
  }catch(e){ return false; }
}

function sizeStore(category, lt){
  return category==='hp' ? selections.hp.mainline : selections[category][lt];
}
function cycleSize(category, lt, size){
  const store = sizeStore(category, lt);
  const cur = store[size];
  if(!cur) store[size] = 'single';
  else if(cur==='single') store[size] = 'multiple';
  else delete store[size];
}
function cyclePolyField(lt, size, field){
  const store = selections.poly[lt];
  const entry = store[size] || {plain:null, casing:null};
  const cur = entry[field];
  if(!cur) entry[field] = 'single';
  else if(cur==='single') entry[field] = 'multiple';
  else entry[field] = null;
  if(!entry.plain && !entry.casing) delete store[size];
  else store[size] = entry;
}
function countIn(category, lt){
  return Object.values(sizeStore(category, lt)).filter(Boolean).length;
}
function countInField(lt, field){
  const store = selections.poly[lt];
  return Object.values(store).filter(e => e && e[field]).length;
}

function renderLtRow(containerId, labels, getCurrent, setCurrent, counter){
  const row = document.getElementById(containerId);
  row.innerHTML = '';
  labels.forEach(([key,label])=>{
    const n = counter(key);
    const b = document.createElement('button');
    b.className = 'ltchip' + (getCurrent()===key ? ' active':'');
    b.textContent = label + (n ? ` (${n})` : '');
    b.onclick = ()=>{ setCurrent(key); render(); };
    row.appendChild(b);
  });
}

function chipBadges(st){
  if(st!=='multiple') return '';
  return '<span class="badge-s">s</span>';
}

function renderSizeGrid(containerId, category, lt){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'chipwrap';
  allSizes().forEach(size=>{
    const st = sizeStore(category, lt)[size];
    const b = document.createElement('button');
    b.className = 'sizechip' + (st ? ' on '+category : '');
    b.innerHTML = size + chipBadges(st);
    b.onclick = ()=>{ cycleSize(category, lt, size); render(); };
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
}

function renderPolyFieldGrid(containerId, lt, field){
  const wrap = document.getElementById(containerId);
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'chipwrap';
  allSizes().forEach(size=>{
    const entry = selections.poly[lt][size] || {};
    const st = entry[field];
    const b = document.createElement('button');
    b.className = 'sizechip' + (st ? ' on poly' : '');
    b.innerHTML = size + chipBadges(st);
    b.onclick = ()=>{ cyclePolyField(lt, size, field); render(); };
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
}

function renderAbandonedSizeGrid(){
  const wrap = document.getElementById('abandonedSizes');
  wrap.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'chipwrap';
  allSizes().forEach(size=>{
    const on = !!selections.abandoned[currentAbandonedMat][size];
    const b = document.createElement('button');
    b.className = 'sizechip' + (on ? ' on abandoned' : '');
    b.textContent = size;
    b.onclick = ()=>{
      if(on) delete selections.abandoned[currentAbandonedMat][size];
      else selections.abandoned[currentAbandonedMat][size] = true;
      render();
    };
    grid.appendChild(b);
  });
  wrap.appendChild(grid);
}

function renderNotes(){
  const wrap = document.getElementById('notewrap');
  wrap.innerHTML = '';
  MODIFIERS.forEach(m=>{
    const b = document.createElement('button');
    const st = noteState[m.key];
    b.className = 'notechip' + (st ? ' on' : '') + (st==='multiple' ? ' multi' : '');
    b.textContent = m.label + (st==='multiple' ? ' (s)' : '');
    b.onclick = ()=>{
      const cur = noteState[m.key];
      if(!cur) noteState[m.key] = 'single';
      else if(cur==='single') noteState[m.key] = 'multiple';
      else delete noteState[m.key];
      render();
    };
    wrap.appendChild(b);
  });
}

function pluralNoun(noun, st){ return st==='multiple' ? noun+'s' : noun; }

function buildNotesClause(){
  const groups = {};
  MODIFIERS.forEach(m=>{
    const st = noteState[m.key];
    if(!st) return;
    if(!groups[m.group]) groups[m.group] = [];
    groups[m.group].push(pluralNoun(m.noun, st));
  });
  return Object.entries(groups).map(([group, nouns])=>{
    const joined = nouns.length===1 ? nouns[0]
      : nouns.length===2 ? nouns.join(' and ')
      : nouns.slice(0,-1).join(', ') + ' and ' + nouns[nouns.length-1];
    const suffix = group==='nearby' ? 'nearby' : 'on property';
    return `from ${joined} ${suffix}`;
  });
}

function hasHighPressure(){
  return Object.values(selections.hp.mainline).some(Boolean);
}

function buildItems(){
  const items = [];
  ['service','mainline'].forEach(lt=>{
    Object.entries(selections.poly[lt]).forEach(([size,entry])=>{
      if(!entry) return;
      const base = `${size} poly ${lt==='service'?'service line':'mainline'}`;
      if(entry.plain){
        items.push(base + (entry.plain==='multiple' ? 's' : ''));
      }
      if(entry.casing){
        items.push(base + (entry.casing==='multiple' ? 's' : '') + ' in casing');
      }
    });
  });
  ['service','mainline'].forEach(lt=>{
    Object.entries(selections.steel[lt]).forEach(([size,count])=>{
      if(!count) return;
      let phrase = `${size} steel ${lt==='service'?'service line':'mainline'}`;
      if(count==='multiple') phrase += 's';
      items.push(phrase);
    });
  });
  Object.entries(selections.hp.mainline).forEach(([size,count])=>{
    if(!count) return;
    let phrase = `${size} steel high pressure mainline`;
    if(count==='multiple') phrase += 's';
    items.push(phrase);
  });
  return items;
}

function buildAbandonedSentence(){
  const items = [];
  ['poly','steel'].forEach(mat=>{
    Object.keys(selections.abandoned[mat]).forEach(size=>{
      if(selections.abandoned[mat][size]) items.push(`${size} ${mat}`);
    });
  });
  if(!items.length) return null;
  const joined = items.length===1 ? items[0] : items.slice(0,-1).join(', ') + ' and ' + items[items.length-1];
  return `Marked abandoned ${joined} by measurement.`;
}

function buildHookupSentence(){
  if(!selectedHouses.length) return null;
  const groups = {};
  const order = [];
  selectedHouses.forEach(h=>{
    const street = h.street || '';
    if(!groups[street]){ groups[street] = []; order.push(street); }
    groups[street].push(h.housenumber);
  });
  const streetPhrases = order.map(street=>{
    const nums = groups[street];
    const joined = nums.length===1 ? nums[0]
      : nums.length===2 ? nums.join(' and ')
      : nums.slice(0,-1).join(', ') + ' and ' + nums[nums.length-1];
    return street ? `${joined} ${street}` : joined;
  });
  const joinedStreets = streetPhrases.length===1 ? streetPhrases[0]
    : streetPhrases.slice(0,-1).join(', ') + ' and ' + streetPhrases[streetPhrases.length-1];
  return `Hooked up at ${joinedStreets}.`;
}

function renderStreetAccordion(){
  const labelEl = document.getElementById('phStreetLabel');
  const wrap = document.getElementById('phAccordion');
  wrap.innerHTML = '';
  if(!nearbyResults.length){ labelEl.style.display = 'none'; return; }
  labelEl.style.display = 'block';
  const { groups, order } = groupByStreet(nearbyResults);
  order.forEach(street=>{
    const label = street || 'No street listed';
    const isActive = currentStreetFilter === street;

    const row = document.createElement('div');
    row.className = 'street-row';

    const header = document.createElement('button');
    header.className = 'street-header' + (isActive ? ' active' : '');
    header.innerHTML = `<span>${label} (${groups[street].length})</span><span class="chev">${isActive ? '▾' : '▸'}</span>`;
    header.onclick = ()=>{ currentStreetFilter = isActive ? null : street; render(); };
    row.appendChild(header);

    if(isActive){
      const housesWrap = document.createElement('div');
      housesWrap.className = 'street-houses';
      const grid = document.createElement('div');
      grid.className = 'chipwrap';
      const houses = groups[street].slice().sort((a,b)=>a.dist-b.dist);
      houses.forEach(h=>{
        const on = isHouseSelected(h);
        const b = document.createElement('button');
        b.className = 'sizechip' + (on ? ' on house' : '');
        const distLabel = isFinite(h.dist) ? `${Math.round(h.dist)}m` : '';
        b.innerHTML = h.housenumber + (distLabel ? `<span class="dist">${distLabel}</span>` : '');
        b.onclick = (ev)=>{ ev.stopPropagation(); toggleHouseSelection(h); render(); };
        grid.appendChild(b);
      });
      housesWrap.appendChild(grid);
      row.appendChild(housesWrap);
    }

    wrap.appendChild(row);
  });
}

function renderSelectedHouses(){
  const wrap = document.getElementById('phSelectedList');
  wrap.innerHTML = '';
  selectedHouses.forEach(h=>{
    const b = document.createElement('button');
    b.className = 'sizechip on house';
    b.textContent = h.street ? `${h.housenumber} ${h.street}` : h.housenumber;
    b.onclick = ()=>{ toggleHouseSelection(h); render(); };
    wrap.appendChild(b);
  });
  document.getElementById('phCount').textContent = selectedHouses.length ? `(${selectedHouses.length})` : '';
  const sentence = buildHookupSentence();
  document.getElementById('phPreview').textContent = sentence || 'No houses selected yet.';
}

function renderPreview(){
  const items = buildItems();
  const notePhrases = buildNotesClause();
  if(notePhrases.length){
    if(items.length) items[items.length-1] += ' ' + notePhrases.join(' and ');
    else items.push(notePhrases.join(' and '));
  }
  const preview = document.getElementById('preview');
  const parts = [];
  if(items.length){
    const joined = items.length===1 ? items[0] : items.slice(0,-1).join(', ') + ' and ' + items[items.length-1];
    parts.push(VERB + ' ' + joined + '.');
  }
  const abandonedSentence = buildAbandonedSentence();
  if(abandonedSentence) parts.push(abandonedSentence);

  if(!parts.length){
    preview.textContent = VERB + '… (tap sizes above to build your note)';
  } else {
    let text = parts.join(' ');
    if(hasHighPressure()) text += ' ' + HP_WARNING;
    preview.textContent = text;
  }
}

function renderQuickCopyList(){
  const wrap = document.getElementById('qcList');
  wrap.innerHTML = '';
  quickPresets.forEach((text, idx)=>{
    const card = document.createElement('button');
    card.className = 'qc-card';
    card.innerHTML = `
      <div class="qc-text">${text}</div>
      <div class="qc-hint">Tap to copy</div>
    `;
    const del = document.createElement('button');
    del.className = 'qc-del';
    del.textContent = 'DEL';
    del.onclick = async (ev)=>{
      ev.stopPropagation();
      quickPresets.splice(idx,1);
      await savePresets();
      render();
    };
    card.appendChild(del);
    card.onclick = async ()=>{
      const ok = await copyTextRobust(text);
      const hint = card.querySelector('.qc-hint');
      if(ok){
        card.classList.add('copied');
        hint.classList.add('copied');
        hint.textContent = 'Copied ✓';
      } else {
        hint.textContent = 'Could not copy — long-press to select';
      }
      setTimeout(()=>{
        card.classList.remove('copied');
        hint.classList.remove('copied');
        hint.textContent = 'Tap to copy';
      }, 1600);
    };
    wrap.appendChild(card);
  });
}

function render(){
  renderLtRow('polyLt', [['service','Service line'],['mainline','Mainline']], ()=>currentLt.poly, (k)=>{currentLt.poly=k;}, (k)=>countInField(k,'plain'));
  renderPolyFieldGrid('polySizes', currentLt.poly, 'plain');
  renderLtRow('polyCasingLt', [['service','Service line'],['mainline','Mainline']], ()=>currentLt.polyCasing, (k)=>{currentLt.polyCasing=k;}, (k)=>countInField(k,'casing'));
  renderPolyFieldGrid('polyCasingSizes', currentLt.polyCasing, 'casing');
  renderLtRow('steelLt', [['service','Service line'],['mainline','Mainline']], ()=>currentLt.steel, (k)=>{currentLt.steel=k;}, (k)=>countIn('steel', k));
  renderSizeGrid('steelSizes', 'steel', currentLt.steel);
  renderSizeGrid('hpSizes', 'hp', 'mainline');
  renderLtRow('abandonedMatRow', [['poly','Poly'],['steel','Steel']], ()=>currentAbandonedMat, (k)=>{currentAbandonedMat=k;}, (k)=>Object.values(selections.abandoned[k]).filter(Boolean).length);
  renderAbandonedSizeGrid();
  renderNotes();
  renderPreview();
  renderQuickCopyList();
  renderStreetAccordion();
  renderSelectedHouses();

  document.getElementById('builderView').style.display = currentTab==='builder' ? '' : 'none';
  document.getElementById('quickCopyView').style.display = currentTab==='quickcopy' ? '' : 'none';
  document.getElementById('projectHousesView').style.display = currentTab==='projecthouses' ? '' : 'none';
  document.getElementById('footerBar').style.display = currentTab==='builder' ? '' : 'none';
  const titles = { builder:'Note Builder', quickcopy:'Quick Copy', projecthouses:'Project Houses' };
  const subs = {
    builder:'TAP SIZES → MULTI-SELECT → COPY',
    quickcopy:'TAP A PRESET TO COPY',
    projecthouses:'FIND & TAP NEARBY HOUSES'
  };
  document.getElementById('pageTitle').textContent = titles[currentTab];
  document.getElementById('pageSub').textContent = subs[currentTab];
  document.querySelectorAll('.menuitem').forEach(el=>{
    el.classList.toggle('active', el.dataset.tab===currentTab);
  });
  syncFooterPadding();
}

document.getElementById('menuBtn').onclick = ()=>{
  const panel = document.getElementById('menuPanel');
  panel.style.display = panel.style.display==='flex' ? 'none' : 'flex';
};
document.querySelectorAll('.menuitem').forEach(el=>{
  el.onclick = ()=>{
    currentTab = el.dataset.tab;
    document.getElementById('menuPanel').style.display = 'none';
    render();
  };
});

document.getElementById('addSizeBtn').onclick = async ()=>{
  const input = document.getElementById('customSizeInput');
  const val = input.value.trim();
  if(!val) return;
  if(!customSizes.includes(val)) customSizes.push(val);
  await saveCustomSizes();
  input.value = '';
  render();
};

document.getElementById('qcAddBtn').onclick = async ()=>{
  const ta = document.getElementById('qcNewText');
  const val = ta.value.trim();
  if(!val) return;
  quickPresets.push(val);
  await savePresets();
  ta.value = '';
  render();
};

document.getElementById('findHousesBtn').onclick = findNearbyHouses;

document.getElementById('phManualAddBtn').onclick = async ()=>{
  const input = document.getElementById('phManualInput');
  const val = input.value.trim();
  if(!val) return;
  const key = val + '|';
  if(!selectedHouses.some(s => houseKey(s)===key)){
    selectedHouses.push({ housenumber: val, street: '' });
    await saveSelectedHouses();
  }
  input.value = '';
  render();
};

document.getElementById('phCopyBtn').onclick = async ()=>{
  const preview = document.getElementById('phPreview');
  const text = preview.textContent;
  const btn = document.getElementById('phCopyBtn');
  const ok = await copyTextRobust(text);
  if(ok){
    btn.textContent = 'Copied ✓';
    btn.classList.add('done');
  } else {
    const range = document.createRange();
    range.selectNodeContents(preview);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    btn.textContent = 'Long-press to copy';
  }
  setTimeout(()=>{ btn.textContent='Copy hookup list'; btn.classList.remove('done'); }, 1800);
};

document.getElementById('phClearBtn').onclick = async ()=>{
  selectedHouses = [];
  await saveSelectedHouses();
  render();
};

document.getElementById('copyBtn').onclick = async ()=>{
  const preview = document.getElementById('preview');
  const text = preview.textContent;
  const btn = document.getElementById('copyBtn');
  const ok = await copyTextRobust(text);
  if(ok){
    btn.textContent = 'Copied ✓';
    btn.classList.add('done');
    setTimeout(()=>{ btn.textContent='Copy note'; btn.classList.remove('done'); }, 1600);
  } else {
    const range = document.createRange();
    range.selectNodeContents(preview);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    btn.textContent = 'Long-press note to copy';
    setTimeout(()=>{ btn.textContent='Copy note'; }, 2600);
  }
};

document.getElementById('clearBtn').onclick = ()=>{
  selections = {
    poly:{service:{}, mainline:{}},
    steel:{service:{}, mainline:{}},
    hp:{mainline:{}},
    abandoned:{poly:{}, steel:{}}
  };
  noteState = {};
  render();
};

const footerEl = document.getElementById('footerBar');
function syncFooterPadding(){
  document.body.style.paddingBottom = (footerEl.offsetHeight + 24) + 'px';
}

(async ()=>{
  await loadCustomSizes();
  await loadPresets();
  await loadSelectedHouses();
  render();
  if('ResizeObserver' in window){
    new ResizeObserver(syncFooterPadding).observe(footerEl);
  }
  window.addEventListener('resize', syncFooterPadding);
  syncFooterPadding();
})();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{ /* offline support optional */ });
  });
}
</script>
</body>
